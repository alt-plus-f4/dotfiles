# Rebind Prefix to CTRL-A
set-option -g prefix C-a
unbind C-b
bind C-a send-prefix

set-option -g base-index 1
set-option -g pane-base-index 1

# Enable mouse support
set-option -g mouse on

# Increase history limit, as we want an "almost" unlimited buffer.
# May be set to something even higher, like 250k
set-option -g history-limit 100000

# Fix Terminal Title display, to not contain tmux specic information
set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

# Open new windows and panes in the current working directory of the active
# pane.
bind c new-window -c "#{pane_current_path}"
bind d split-window -c "#{pane_current_path}"
bind a split-window -h -c "#{pane_current_path}"

# Enable extended support for some more sophisticated terminal emulator
# features. Disable them if they are causing problems!
set-option -s focus-events on
set-option -s extended-keys on

# Disable waiting time when pressing escape, for smoother Neovim usage. Disable
# if differentiation between function and meta keycombination is needed.
set-option -s escape-time 0 

##
# Styling
##

# Terminala + Catppuccin inspired palette
# Keep bg=${BG} in tmux styles so terminal opacity/blur stays visible.
BG="#130b1f"
SURFACE="#1e152d"
BAR_BG="#241b35"
FG="#cdd6f4"
MUTED="#a6adc8"
MAUVE="#cba6f7"
LAVENDER="#b4befe"
ROSE="#b4befe"

# Uncomment to move statusbar to the top
# set-option -g status-position top

# Basic colors of the Statusbar
# Make status bar transparent
set -g status-style "fg=#cdd6f4,bg=#130b1f"
set -g status-fg "#cdd6f4"
set -g status-bg "#130b1f"
set -g status-left-style "fg=#b4befe,bg=#130b1f"
set -g status-right-style "fg=#a6adc8,bg=#130b1f"
set -g status-left "#[fg=#b4befe,bold] #S "
set -g status-right "#[fg=#a6adc8] %H:%M #[fg=#b4befe]#h "

# Keep other UI elements styled (these do NOT break transparency)
set -g mode-style "bg=#1e152d,fg=#b4befe"
set -g message-style "bg=#1e152d,fg=#cdd6f4"

# Show the window list centered between the left and the right section
set-option -g status-justify centre
set-option -g status-left-length 100
set-option -g status-right-length 100

# Keep window list background aligned with status bar background
set-option -g window-status-style "fg=#a6adc8,bg=#130b1f"
set-option -g window-status-current-style "fg=#b4befe,bg=#130b1f,bold"

# Style and set content for the inactive windows
set-option -g window-status-format " #I:#W "

# Style and set content for the active windows
set-option -g window-status-current-format " #I:#W "

# Remove the separator between window list items, as we already have spacing
# "around" inactive items
set-option -g window-status-separator ""
